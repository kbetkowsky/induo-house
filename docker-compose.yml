services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: induo-postgres
    environment:
      POSTGRES_DB: property_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: induo-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    image: ${ECR_REGISTRY}/induo-backend:latest
    container_name: induo-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/property_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      JWT_COOKIE_SAME_SITE: ${JWT_COOKIE_SAME_SITE:-Lax}
      APP_AI_ENABLED: ${APP_AI_ENABLED:-true}
      APP_AI_RAG_ENABLED: ${APP_AI_RAG_ENABLED:-false}
      APP_AI_ASSISTANT_NAME: ${APP_AI_ASSISTANT_NAME:-Induo Assistant}
      OLLAMA_BASE_URL: http://ollama:11434
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-llama3.1:8b}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    image: ${ECR_REGISTRY}/induo-frontend:latest
    container_name: induo-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
