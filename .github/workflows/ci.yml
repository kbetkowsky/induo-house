name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Tests (Java 21 + Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Make mvnw executable
        run: chmod +x induo-house/mvnw
      - name: Run tests
        run: cd induo-house && ./mvnw clean test
        env:
          DB_PASSWORD: test_password
          JWT_SECRET: test_secret_minimum_32_characters_long

  frontend:
    name: Frontend Tests + Build (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: induo-house-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: induo-house-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
