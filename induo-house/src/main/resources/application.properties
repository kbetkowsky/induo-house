spring.application.name=induo-house
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/property_db}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

server.port=8080

springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs

file.upload-dir=uploads/images
server.base-url=http://localhost:8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.cookie.name=auth_token
jwt.cookie.max-age=86400
jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE:Lax}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

app.ai.enabled=${APP_AI_ENABLED:false}
app.ai.rag.enabled=${APP_AI_RAG_ENABLED:false}
app.ai.assistant-name=${APP_AI_ASSISTANT_NAME:Induo Assistant}

spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${AI_CHAT_MODEL:llama3.1:8b}
spring.ai.ollama.chat.options.model=${AI_CHAT_MODEL:llama3.1:8b}
spring.ai.ollama.embedding.model=${AI_EMBEDDING_MODEL:nomic-embed-text}
spring.ai.ollama.embedding.options.model=${AI_EMBEDDING_MODEL:nomic-embed-text}

spring.ai.vectorstore.pgvector.initialize-schema=${APP_AI_RAG_ENABLED:false}
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.index-type=hnsw
